# This is a Databricks asset bundle definition for datawizard_lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: datawizard_lakehouse
  uuid: 8f80853f-ba35-409c-8047-4ee3a19473d1

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-dfb14324-e95d.cloud.databricks.com
    variables:
      catalog: bronze
      schema: rrhh
  prod:
    mode: production
    workspace:
      host: https://dbc-dfb14324-e95d.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/daniel.epr77@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/datawizard_lakehouse/${bundle.name}/${bundle.target}
    variables:
      catalog: bronze
      schema: prod
    permissions:
      - user_name: daniel.epr77@gmail.com
        level: CAN_MANAGE
